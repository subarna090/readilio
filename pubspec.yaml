name: readilio
description: Readilio — offline storybook read-aloud app for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Camera & image picking
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Image processing
  image: ^4.2.0
  flutter_image_compress: ^2.3.0

  # OCR
  google_mlkit_text_recognition: ^0.13.1

  # Text-to-speech
  flutter_tts: ^4.2.0

  # Audio service (background playback)
  audio_service: ^0.18.16
  just_audio: ^0.9.43

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/

  # fonts:
  #   - family: Quicksand  (add font files to assets/fonts/ to enable)
  #     fonts:
  #       - asset: assets/fonts/Quicksand-Regular.ttf
  #       - asset: assets/fonts/Quicksand-Bold.ttf
  #         weight: 700
